<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <meta name="application-name" content="Mango Finance" />
    <meta name="apple-mobile-web-app-title" content="Mango Finance" />
    <meta name="theme-color" content="#f9fafb" />
    <link rel="icon" type="image/svg+xml" href="/mango-logo.svg" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/mango_logo_192x192.png"
    />
    <link rel="apple-touch-icon" href="/mango_logo_256x256.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mango Finance</title>

    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme");
        const systemDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;
        if (savedTheme === "dark" || (!savedTheme && systemDark)) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>

    <style>
      /* 默认亮色模式背景 (跟你的 bg-gray-50 #f9fafb 保持一致) */
      html {
        background-color: #f9fafb;
      }

      /* 暗色模式背景 (跟你的 dark:bg-gray-900 #111827 保持一致) */
      html.dark {
        background-color: #111827;
        color: #f3f4f6;
      }

      #app {
        min-height: 100vh;
      }

      .app-shell {
        display: flex;
        min-height: 100vh;
      }

      .app-sidebar-header {
        display: flex;
        align-items: center;
      }

      .app-sidebar-brand,
      .app-sidebar-version {
        margin: 0;
        white-space: nowrap;
      }
    </style>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
